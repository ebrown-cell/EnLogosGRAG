# Vendor-scoped product detection rules.
#
# Each rule binds a vendor + product name + a regex. The classifier only
# fires a rule against documents whose vendor matches `vendor` (so Potter
# rules can't accidentally match Notifier docs). First match per
# (document, vendor) wins.
#
# Match field selects what to test:
#   name        - file basename
#   path        - full file path (catches "...PSN-1000/foo.pdf")
#   first_page  - first PDF page text from the extract
#   extract     - full extracted text
#
# Confidence:
#   high   - filename or path match (very specific)
#   medium - body-text match (could be a passing reference)
#   low    - reserved for fuzzy / catalog-derived hits
#
# Patterns are JS regexes, case-insensitive, no leading/trailing slashes.
# First match wins, so put more specific rules above general ones.

